deployment:
  tasks:
    - export DEPLOYPATH=/home/tojjepvr/ansar-eats/
    - /bin/rsync -avz --exclude '.git' --exclude 'node_modules' --exclude 'vendor' --exclude '.env' --exclude 'project_release.zip' * $DEPLOYPATH
    
    # Move public files to public_html
    - export PUBLICPATH=/home/tojjepvr/public_html/
    - /bin/rsync -avz public/* $PUBLICPATH
    
    # Run production optimizations
    - cd $DEPLOYPATH
    - /usr/local/bin/php artisan migrate --force
    - /usr/local/bin/php artisan optimize
